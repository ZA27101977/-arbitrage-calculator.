<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחשבון ארביטראז' - הלוואה מול S&P 500</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f1f5f9; }
        .card { background: white; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .input-group label { display: block; font-size: 0.875rem; font-weight: 600; color: #334155; margin-bottom: 0.35rem; }
        .input-group input { width: 100%; border: 1px solid #e2e8f0; border-radius: 8px; padding: 0.6rem; outline: none; transition: all 0.2s; }
        .input-group input:focus { border-color: #3b82f6; ring: 2px; ring-color: #3b82f6; }
        th { background-color: #f8fafc; color: #64748b; font-size: 0.75rem; text-transform: uppercase; padding: 1rem; border-bottom: 2px solid #e2e8f0; text-align: right; }
        td { padding: 1rem; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; text-align: right; }
        .negative { color: #ef4444; font-weight: 600; }
        .positive { color: #10b981; font-weight: 600; }
    </style>
</head>
<body class="pb-12">

    <nav class="bg-white py-4 px-6 mb-8 shadow-sm sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-2 rounded-lg text-white font-bold">S&P</div>
                <span class="text-xl font-bold text-slate-800">מחשבון ארביטראז'</span>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-12">
            <div class="card p-8 lg:col-span-1">
                <h2 class="text-xl font-bold mb-6 border-b pb-2">הגדרות סימולציה</h2>
                <div class="space-y-5">
                    <div class="input-group">
                        <label>סכום הלוואה (₪)</label>
                        <input type="number" id="loanAmount" value="200000" oninput="calculate()">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="input-group">
                            <label>ריבית פריים (%)</label>
                            <input type="number" id="primeRate" value="5.5" step="0.1" oninput="calculate()">
                        </div>
                        <div class="input-group">
                            <label>מרווח (%)</label>
                            <input type="number" id="margin" value="-0.5" step="0.1" oninput="calculate()">
                        </div>
                    </div>
                    <div class="input-group">
                        <label>תשואה שנתית צפויה (%)</label>
                        <input type="number" id="marketYield" value="9" step="0.5" oninput="calculate()">
                    </div>
                    <div class="input-group">
                        <label>דמי ניהול (%)</label>
                        <input type="number" id="managementFee" value="0.6" step="0.1" oninput="calculate()">
                    </div>
                </div>

                <div class="mt-8 p-5 bg-blue-600 rounded-xl text-white">
                    <h3 class="font-bold mb-1">החזר חודשי (ריבית)</h3>
                    <span class="text-3xl font-bold">₪<span id="monthlyPaymentDisplay">833</span></span>
                </div>
            </div>

            <div class="card p-8 lg:col-span-2">
                <h2 class="text-xl font-bold mb-8">תחזית ל-5 שנים</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                    <div class="p-4 bg-slate-50 rounded-xl border">
                        <div class="text-xs text-slate-500 mb-1">רווח השקעה ברוטו</div>
                        <div id="totalGrossProfit" class="text-xl font-bold">0 ₪</div>
                    </div>
                    <div class="p-4 bg-slate-50 rounded-xl border">
                        <div class="text-xs text-slate-500 mb-1">עלות ריבית מצטברת</div>
                        <div id="totalInterestCost" class="text-xl font-bold text-rose-500">0 ₪</div>
                    </div>
                    <div class="p-4 bg-emerald-50 rounded-xl border border-emerald-100">
                        <div class="text-xs text-emerald-600 mb-1">רווח נטו (אחרי מס)</div>
                        <div id="totalNetProfit" class="text-2xl font-bold text-emerald-700">0 ₪</div>
                    </div>
                </div>
                <div class="h-64">
                    <canvas id="growthChart"></canvas>
                </div>
            </div>
        </div>

        <div class="card overflow-hidden">
            <div class="p-6 bg-slate-800 text-white font-bold text-lg text-center">פירוט תזרים חודשי</div>
            <div class="overflow-x-auto max-h-96">
                <table id="resultsTable">
                    <thead>
                        <tr>
                            <th>חודש</th>
                            <th>חוב (קרן)</th>
                            <th>תשלום ריבית</th>
                            <th>שווי קופה</th>
                            <th>רווח נטו</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let chart;
        function calculate() {
            const loanAmount = parseFloat(document.getElementById('loanAmount').value) || 0;
            const prime = parseFloat(document.getElementById('primeRate').value) || 0;
            const margin = parseFloat(document.getElementById('margin').value) || 0;
            const marketYield = parseFloat(document.getElementById('marketYield').value) || 0;
            const managementFee = parseFloat(document.getElementById('managementFee').value) || 0;

            const annualInterest = prime + margin;
            const monthlyInterestRate = (annualInterest / 100) / 12;
            const monthlyYieldRate = ((marketYield - managementFee) / 100) / 12;
            const monthlyPayment = loanAmount * monthlyInterestRate;

            document.getElementById('monthlyPaymentDisplay').innerText = Math.round(monthlyPayment).toLocaleString();

            const months = 60;
            let currentInv = loanAmount;
            let totalInt = 0;
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';
            
            const labels = []; const invData = []; const loanData = [];

            for (let i = 0; i <= months; i++) {
                if (i > 0) { currentInv *= (1 + monthlyYieldRate); totalInt += monthlyPayment; }
                const net = currentInv - loanAmount - totalInt;

                if (i % 6 === 0 || i === months) {
                    labels.push('חודש ' + i);
                    invData.push(Math.round(currentInv));
                    loanData.push(loanAmount);
                }

                tableBody.innerHTML += `<tr>
                    <td>${i}</td>
                    <td>${loanAmount.toLocaleString()} ₪</td>
                    <td>${i === 0 ? '-' : Math.round(monthlyPayment).toLocaleString() + ' ₪'}</td>
                    <td class="${currentInv < loanAmount ? 'negative' : 'positive'}">${Math.round(currentInv).toLocaleString()} ₪</td>
                    <td class="${net < 0 ? 'negative' : 'positive'} font-bold">${Math.round(net).toLocaleString()} ₪</td>
                </tr>`;
            }

            const gross = currentInv - loanAmount;
            const netBeforeTax = gross - totalInt;
            const tax = netBeforeTax > 0 ? netBeforeTax * 0.25 : 0;
            const finalNet = netBeforeTax - tax;

            document.getElementById('totalGrossProfit').innerText = Math.round(gross).toLocaleString() + ' ₪';
            document.getElementById('totalInterestCost').innerText = Math.round(totalInt).toLocaleString() + ' ₪';
            document.getElementById('totalNetProfit').innerText = Math.round(finalNet).toLocaleString() + ' ₪';

            updateChart(labels, invData, loanData);
        }

        function updateChart(labels, invData, loanData) {
            const ctx = document.getElementById('growthChart').getContext('2d');
            if (chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'שווי השקעה', data: invData, borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.1)', fill: true, tension: 0.4 },
                        { label: 'חוב', data: loanData, borderColor: '#ef4444', borderDash: [5, 5], fill: false, tension: 0 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { position: 'right' }, x: { reverse: true } }, plugins: { legend: { rtl: true } } }
            });
        }
        window.onload = calculate;
    </script>
</body>
</html>
